<!DOCTYPE html>
<html>
  <head>
    <title>SCPA Event - Change Password</title>
    <style>
      body {
        margin: 0px;
      }
      header {
        margin: 0px;
        padding: 25px;
        background-color: #a51717;
        color: rgb(238, 238, 238);
      }
      main {
        padding: 30px;
      }
      input {
        padding: 5px;
        border-radius: 8px;
        border-width: 1px;
        margin-bottom: 15px;
      }
      * {
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Change Password</h1>
    </header>
    <main>
      <p><b>Enter your new password.</b></p>
      <form action="/auth/passchange" method="post">
        <label for="newPassword">New Password</label><br>
        <input type="password" id="newPassword" name="newPassword" required><br>
        <input type="submit">
      </form>
      <a href="/admin">Back to Dashboard</a>
    </main>
  </body>
</html>
