<!DOCTYPE html>
<html>
  <head>
    <title>Page Not Found</title>
    <style>
      body {
        margin: 0px;
      }
      header {
        margin: 0px;
        padding: 25px;
        background-color: #202020;
        color: rgb(238, 238, 238);
      }
      main {
        padding: 30px;
      }
      * {
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Page Not Found</h1>
    </header>
    <main>
      <p>The requested resource was not found on the server.</p>
      <p id="requestTime"></p>
    </main>

    <script>
      document.getElementById("requestTime").innerText = "Requested at " + new Date().toISOString() + " UTC.";
    </script>
  </body>
</html>
